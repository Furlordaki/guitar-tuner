<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Guitar Tuner</title>
<style>

body{
background:#0b0c10;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

button{
padding:14px 20px;
font-size:18px;
background:#3a86ff;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

#note{
font-size:60px;
font-weight:bold;
margin-top:20px;
}

#freq{
font-size:22px;
opacity:.8;
}

#cents{
font-size:40px;
margin-top:10px;
}

canvas{
margin-top:30px;
width:100%;
max-width:600px;
height:120px;
background:black;
border-radius:10px;
}

</style>
</head>

<body>

<h2>Strobe Guitar Tuner</h2>

<button id="startBtn">Start Microphone</button>

<div id="note">—</div>
<div id="freq">— Hz</div>
<div id="cents">—</div>

<canvas id="strobe" width="800" height="120"></canvas>

<script>

let audioContext
let analyser
let data
let running=false

const noteEl=document.getElementById("note")
const freqEl=document.getElementById("freq")
const centsEl=document.getElementById("cents")

const canvas=document.getElementById("strobe")
const ctx=canvas.getContext("2d")

let strobeOffset=0
let lastCents=0

const notes=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"]

function freqToNote(freq){

let midi=69+12*Math.log2(freq/440)
let rounded=Math.round(midi)

let note=notes[(rounded%12+12)%12]
let octave=Math.floor(rounded/12)-1

let ref=440*Math.pow(2,(rounded-69)/12)

let cents=1200*Math.log2(freq/ref)

return{
note:note+octave,
cents:cents
}

}

function autoCorrelate(buffer,sampleRate){

let SIZE=buffer.length
let rms=0

for(let i=0;i<SIZE;i++){
let val=buffer[i]
rms+=val*val
}

rms=Math.sqrt(rms/SIZE)

if(rms<0.01)return null

let r1=0
let r2=SIZE-1

for(let i=0;i<SIZE/2;i++){
if(Math.abs(buffer[i])<0.2){r1=i;break}
}

for(let i=1;i<SIZE/2;i++){
if(Math.abs(buffer[SIZE-i])<0.2){r2=SIZE-i;break}
}

buffer=buffer.slice(r1,r2)
SIZE=buffer.length

let c=new Array(SIZE).fill(0)

for(let i=0;i<SIZE;i++){
for(let j=0;j<SIZE-i;j++){
c[i]+=buffer[j]*buffer[j+i]
}
}

let d=0
while(c[d]>c[d+1])d++

let maxval=-1
let maxpos=-1

for(let i=d;i<SIZE;i++){
if(c[i]>maxval){
maxval=c[i]
maxpos=i
}
}

let T0=maxpos

return sampleRate/T0

}

function drawStrobe(cents){

ctx.clearRect(0,0,canvas.width,canvas.height)

let stripe=40

let speed=cents/3

strobeOffset+=speed

for(let x=-stripe*2;x<canvas.width+stripe*2;x+=stripe){

let pos=x+strobeOffset%stripe

ctx.fillStyle="orange"
ctx.fillRect(pos,0,stripe/2,canvas.height)

}

ctx.fillStyle="white"
ctx.fillRect(canvas.width/2-1,0,2,canvas.height)

}

function render(freq){

if(!freq)return

let info=freqToNote(freq)

noteEl.textContent=info.note
freqEl.textContent=freq.toFixed(2)+" Hz"

let cents=Math.round(info.cents)

centsEl.textContent=(cents>0?"+":"")+cents+" cents"

lastCents=cents

}

function loop(){

analyser.getFloatTimeDomainData(data)

let freq=autoCorrelate(data,audioContext.sampleRate)

render(freq)

drawStrobe(lastCents)

requestAnimationFrame(loop)

}

async function start(){

if(running)return

audioContext=new AudioContext()

const stream=await navigator.mediaDevices.getUserMedia({audio:true})

const source=audioContext.createMediaStreamSource(stream)

analyser=audioContext.createAnalyser()

analyser.fftSize=2048

source.connect(analyser)

data=new Float32Array(analyser.fftSize)

running=true

document.getElementById("startBtn").innerText="Mic Running"

loop()

}

document.getElementById("startBtn").onclick=start

</script>

</body>
</html>
