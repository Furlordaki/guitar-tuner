<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Strobe Guitar Tuner</title>
  <style>
    body{margin:0;padding:16px;font-family:system-ui,Arial;background:#0b0c10;color:#e8e8e8}
    .card{max-width:740px;margin:0 auto;background:#14161c;border-radius:16px;padding:16px;box-shadow:0 10px 28px rgba(0,0,0,.35)}
    h1{margin:0 0 8px 0;font-size:22px}
    p{margin:0 0 12px 0;opacity:.8;line-height:1.35}
    button{width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:#3a86ff;color:white;font-weight:800;cursor:pointer}
    button:disabled{opacity:.6;cursor:not-allowed}
    .row{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px}
    .box{flex:1;min-width:240px;background:#0f1117;border:1px solid rgba(255,255,255,.10);border-radius:14px;padding:12px}
    .big{font-size:44px;font-weight:900;line-height:1}
    .muted{opacity:.75}
    canvas{width:100%;height:120px;border-radius:12px;border:1px solid rgba(255,255,255,.10);background:#07080d;display:block}
    .err{display:none;margin-top:12px;padding:10px 12px;border-radius:12px;background:rgba(255,0,110,.12);border:1px solid rgba(255,0,110,.35);white-space:pre-wrap;font-size:12.5px;line-height:1.35}
    .meter{margin-top:10px;height:12px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);overflow:hidden}
    .fill{height:100%;width:0%;background:rgba(58,134,255,.9)}
    .slider{width:100%}
    .pill{display:inline-block;padding:4px 10px;border-radius:999px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.10);font-size:12px;margin-right:8px}
  </style>
</head>
<body>
  <div class="card">
    <h1>Strobe Guitar Tuner</h1>
    <p>This version smooths pitch so cents and strobe stop jumping around.</p>

    <button id="startBtn">Start microphone</button>
    <div id="err" class="err"></div>

    <div style="margin-top:10px">
      <span class="pill" id="gatePill">Gate: 0.003</span>
      <span class="pill" id="pitchPill">Pitch: —</span>
    </div>

    <div class="row">
      <div class="box">
        <div class="muted">Detected</div>
        <div class="big" id="note">—</div>
        <div class="muted" id="freq">— Hz</div>
        <div class="muted" id="cents">—</div>

        <div style="margin-top:10px">
          <div class="muted">Input level</div>
          <div class="meter"><div class="fill" id="lvl"></div></div>
          <div class="muted" id="rms">RMS: —</div>
        </div>

        <div style="margin-top:12px">
          <div class="muted">Gate (lower = more sensitive)</div>
          <input id="gate" class="slider" type="range" min="0.001" max="0.020" step="0.001" value="0.003">
        </div>
      </div>

      <div class="box">
        <div class="muted">Strobe</div>
        <canvas id="strobe" width="900" height="240"></canvas>
        <div class="muted" id="dbg" style="margin-top:8px;font-size:12px">Strobe: —</div>
      </div>
    </div>
  </div>

<script>
(() => {
  const err = document.getElementById('err');
  const showErr = (m) => { err.style.display='block'; err.textContent=m; };

  window.addEventListener('error', (e) => {
    showErr('JavaScript error:\\n' + (e.message || e.type));
  });

  const startBtn = document.getElementById('startBtn');
  const noteEl = document.getElementById('note');
  const freqEl = document.getElementById('freq');
  const centsEl = document.getElementById('cents');
  const lvlFill = document.getElementById('lvl');
  const rmsEl = document.getElementById('rms');
  const dbgEl = document.getElementById('dbg');

  const gateSlider = document.getElementById('gate');
  const gatePill = document.getElementById('gatePill');
  const pitchPill = document.getElementById('pitchPill');

  const canvas = document.getElementById('strobe');
  const ctx = canvas.getContext('2d');

  const NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

  function freqToMidi(f){ return 69 + 12*Math.log2(f/440); }
  function midiToFreq(m){ return 440*Math.pow(2,(m-69)/12); }
  function midiToName(m){
    const mi = Math.round(m);
    const name = NAMES[(mi % 12 + 12) % 12];
    const oct = Math.floor(mi / 12) - 1;
    return name + oct;
  }
  function centsOff(f, ref){ return 1200 * Math.log2(f / ref); }

  function rmsOf(buf){
    let s = 0;
    for(let i = 0; i < buf.length; i++){
      const v = buf[i];
      s += v * v;
    }
    return Math.sqrt(s / buf.length);
  }

  function yinPitch(buf, sampleRate, minFreq = 35, maxFreq = 650){
    const N = buf.length;
    const minTau = Math.floor(sampleRate / maxFreq);
    const maxTau = Math.min(Math.floor(sampleRate / minFreq), N - 2);
    if (maxTau <= minTau + 2) return null;

    const d = new Float32Array(maxTau + 1);
    for (let tau = 1; tau <= maxTau; tau++){
      let sum = 0;
      for (let i = 0; i < N - tau; i++){
        const delta = buf[i] - buf[i + tau];
        sum += delta * delta;
      }
      d[tau] = sum;
    }

    const cmnd = new Float32Array(maxTau + 1);
    cmnd[0] = 1;
    let run = 0;
    for (let tau = 1; tau <= maxTau; tau++){
      run += d[tau];
      cmnd[tau] = d[tau] * tau / (run || 1);
    }

    const threshold = 0.18;
    let tau = -1;
    for (let t = minTau; t <= maxTau; t++){
      if (cmnd[t] < threshold){
        while (t + 1 <= maxTau && cmnd[t + 1] < cmnd[t]) t++;
        tau = t;
        break;
      }
    }

    if (tau === -1) return null;

    const t0 = tau - 1, t1 = tau, t2 = tau + 1;
    if (t0 < 1 || t2 > maxTau) return null;

    const s0 = cmnd[t0], s1 = cmnd[t1], s2 = cmnd[t2];
    const denom = (2 * s1 - s0 - s2);
    const betterTau = denom ? (t1 + (s0 - s2) / (2 * denom)) : t1;

    const freq = sampleRate / betterTau;
    const conf = 1 - cmnd[tau];

    if (!Number.isFinite(freq) || freq < minFreq || freq > maxFreq) return null;
    return { freq, conf };
  }

  let gate = Number(gateSlider.value);
  gatePill.textContent = `Gate: ${gate.toFixed(3)}`;
  gateSlider.addEventListener('input', () => {
    gate = Number(gateSlider.value);
    gatePill.textContent = `Gate: ${gate.toFixed(3)}`;
  });

  let strobeOffset = 0;
  let lastCents = 0;
  let hasPitch = false;

  let freqHistory = [];
  const SMOOTHING_WINDOW = 6;

  function smoothFrequency(freq) {
    freqHistory.push(freq);
    if (freqHistory.length > SMOOTHING_WINDOW) {
      freqHistory.shift();
    }

    let sum = 0;
    for (let i = 0; i < freqHistory.length; i++) {
      sum += freqHistory[i];
    }
    return sum / freqHistory.length;
  }

  function resetSmoothing() {
    freqHistory = [];
  }

  function drawStrobe(){
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle = '#07080d';
    ctx.fillRect(0,0,w,h);

    ctx.fillStyle = 'rgba(255,255,255,.85)';
    ctx.fillRect(w/2 - 1, 0, 2, h);

    const clamp = 50;
    const c = Math.max(-clamp, Math.min(clamp, lastCents));
    const abs = Math.abs(c);

    let speed;
    if (!hasPitch){
      speed = 0.10;
    } else {
      const maxSpeed = 2.2;
      const minSpeed = 0.05;
      speed = minSpeed + (abs / clamp) * (maxSpeed - minSpeed);
      speed *= (c < 0 ? -1 : 1);
    }

    strobeOffset += speed;

    const stripeW = 42, gapW = 30, period = stripeW + gapW;
    strobeOffset = ((strobeOffset % period) + period) % period;

    const alpha = hasPitch ? 0.55 : 0.18;
    ctx.fillStyle = `rgba(255,190,11,${alpha})`;

    for(let x = -period * 2; x < w + period * 2; x += period){
      const xp = x + strobeOffset;
      ctx.save();
      ctx.translate(xp, 0);
      ctx.transform(1, 0.18, 0, 1, 0, 0);
      ctx.fillRect(0, 0, stripeW, h);
      ctx.restore();
    }

    dbgEl.textContent = `Strobe: cents=${c.toFixed(2)} speed=${speed.toFixed(2)} pitch=${hasPitch ? 'YES' : 'NO'}`;
    requestAnimationFrame(drawStrobe);
  }
  requestAnimationFrame(drawStrobe);

  let audioCtx, analyser, buf, rafId, stream;

  async function start(){
    err.style.display = 'none';
    startBtn.disabled = true;
    startBtn.textContent = 'Starting…';

    try{
      stream = await navigator.mediaDevices.getUserMedia({
        audio:{ echoCancellation:false, noiseSuppression:false, autoGainControl:false }
      });

      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state !== 'running') await audioCtx.resume();

      const src = audioCtx.createMediaStreamSource(stream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 2048;
      analyser.smoothingTimeConstant = 0.0;
      src.connect(analyser);

      buf = new Float32Array(analyser.fftSize);

      const loop = () => {
        analyser.getFloatTimeDomainData(buf);

        const rms = rmsOf(buf);
        const pct = Math.min(100, Math.max(0, (rms / 0.06) * 100));
        lvlFill.style.width = pct.toFixed(1) + '%';
        rmsEl.textContent = 'RMS: ' + rms.toFixed(4);

        if (rms < gate){
          hasPitch = false;
          pitchPill.textContent = 'Pitch: —';
          noteEl.textContent = '—';
          freqEl.textContent = '— Hz';
          centsEl.textContent = '—';
          lastCents = 0;
          resetSmoothing();
          rafId = requestAnimationFrame(loop);
          return;
        }

        const res = yinPitch(buf, audioCtx.sampleRate, 35, 650);
        if (!res){
          hasPitch = false;
          pitchPill.textContent = 'Pitch: —';
          noteEl.textContent = '—';
          freqEl.textContent = '— Hz';
          centsEl.textContent = '—';
          lastCents = 0;
          resetSmoothing();
          rafId = requestAnimationFrame(loop);
          return;
        }

        hasPitch = true;

        const rawFreq = res.freq;
        const f = smoothFrequency(rawFreq);

        pitchPill.textContent = `Pitch: ${f.toFixed(1)} Hz (conf ${res.conf.toFixed(2)})`;

        const m = freqToMidi(f);
        const ref = midiToFreq(Math.round(m));
        const cents = centsOff(f, ref);

        noteEl.textContent = midiToName(m);
        freqEl.textContent = f.toFixed(2) + ' Hz';
        centsEl.textContent = (cents >= 0 ? '+' : '') + cents.toFixed(2) + ' cents';

        lastCents = cents;

        rafId = requestAnimationFrame(loop);
      };

      loop();
      startBtn.textContent = 'Mic running';
    } catch(e){
      startBtn.disabled = false;
      startBtn.textContent = 'Start microphone';
      showErr('Mic start failed:\\n' + (e?.message || String(e)));
    }
  }

  startBtn.addEventListener('click', start);

  document.addEventListener('visibilitychange', () => {
    if(document.hidden){
      if(rafId) cancelAnimationFrame(rafId);
      if(stream) stream.getTracks().forEach(t => t.stop());
      if(audioCtx) audioCtx.close();
      startBtn.disabled = false;
      startBtn.textContent = 'Start microphone';
      hasPitch = false;
      lastCents = 0;
      resetSmoothing();
    }
  });
})();
</script>
</body>
</html>
