<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guitar Tuner</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --text: #e8ecf1;
      --muted: #98a2b3;
      --accent: #5eead4;
      --good: #22c55e;
      --warn: #f59e0b;
      --bad: #ef4444;
      --line: #2a2f3a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, Arial, sans-serif;
      background: linear-gradient(180deg, #0b0d11 0%, #121722 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .app {
      width: min(760px, 100%);
      background: rgba(23, 26, 33, 0.95);
      border: 1px solid #202532;
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 20px;
    }

    .topbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 22px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 18px;
      background: var(--accent);
      color: #04201d;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover { filter: brightness(1.05); }

    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: rgba(255,255,255,0.02);
      font-size: 14px;
    }

    .readout {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      min-height: 96px;
    }

    .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .value {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .value.small {
      font-size: 24px;
    }

    .needle-wrap {
      margin: 10px 0 16px;
      padding: 18px 14px 22px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line);
      border-radius: 22px;
    }

    .scale {
      position: relative;
      height: 180px;
      overflow: hidden;
    }

    .arc {
      position: absolute;
      left: 50%;
      bottom: 18px;
      width: 420px;
      height: 420px;
      transform: translateX(-50%);
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: #384152;
      border-left-color: #384152;
      border-right-color: #384152;
      transform-origin: center center;
    }

    .tick {
      position: absolute;
      left: 50%;
      bottom: 28px;
      width: 2px;
      height: 18px;
      background: #5b6476;
      transform-origin: bottom center;
      border-radius: 2px;
    }

    .tick.major {
      height: 26px;
      width: 3px;
      background: #7a859a;
    }

    .tick.center {
      background: var(--good);
      height: 34px;
      width: 4px;
    }

    .tick-label {
      position: absolute;
      left: 50%;
      bottom: 0;
      color: var(--muted);
      font-size: 12px;
      transform-origin: center center;
      white-space: nowrap;
    }

    .needle {
      position: absolute;
      left: 50%;
      bottom: 28px;
      width: 4px;
      height: 118px;
      background: linear-gradient(180deg, #f8fafc 0%, #cbd5e1 100%);
      border-radius: 999px;
      transform-origin: bottom center;
      transform: translateX(-50%) rotate(0deg);
      box-shadow: 0 0 18px rgba(255,255,255,0.18);
    }

    .needle::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -10px;
      width: 20px;
      height: 20px;
      background: #dbe4ee;
      border-radius: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 0 6px rgba(255,255,255,0.05);
    }

    .center-band {
      position: absolute;
      left: 50%;
      bottom: 28px;
      width: 42px;
      height: 120px;
      transform: translateX(-50%);
      background: linear-gradient(
        180deg,
        rgba(34,197,94,0.00) 0%,
        rgba(34,197,94,0.12) 30%,
        rgba(34,197,94,0.18) 70%,
        rgba(34,197,94,0.08) 100%
      );
      border-radius: 999px;
      pointer-events: none;
    }

    .status {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      margin-top: 8px;
    }

    .status.good { color: var(--good); }
    .status.warn { color: var(--warn); }
    .status.bad { color: var(--bad); }

    .meter-wrap {
      margin-top: 18px;
    }

    .meter-label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .meter {
      height: 12px;
      border-radius: 999px;
      background: #222734;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .meter-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #334155 0%, #5eead4 100%);
    }

    .targets {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
    }

    .target {
      padding: 12px 10px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      text-align: center;
      cursor: pointer;
      user-select: none;
    }

    .target.active {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px var(--accent);
      color: var(--accent);
    }

    .target .name {
      font-weight: 800;
      font-size: 18px;
    }

    .target .hz {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    .footer-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    @media (max-width: 720px) {
      .readout {
        grid-template-columns: 1fr;
      }

      .targets {
        grid-template-columns: repeat(3, 1fr);
      }

      .scale {
        height: 160px;
      }

      .arc {
        width: 340px;
        height: 340px;
      }

      .needle {
        height: 104px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Guitar Tuner</h1>
    <div class="subtitle">Needle tuner with smoothing for standard tuning</div>

    <div class="topbar">
      <button id="startBtn">Start Microphone</button>
      <div class="pill" id="micState">Mic: off</div>
      <div class="pill" id="signalState">Signal: waiting</div>
    </div>

    <div class="readout">
      <div class="card">
        <div class="label">Detected note</div>
        <div class="value" id="noteName">--</div>
      </div>
      <div class="card">
        <div class="label">Frequency</div>
        <div class="value small"><span id="freq">0.0</span> Hz</div>
      </div>
      <div class="card">
        <div class="label">Cents</div>
        <div class="value small"><span id="cents">0.0</span></div>
      </div>
    </div>

    <div class="needle-wrap">
      <div class="scale" id="scale">
        <div class="arc"></div>
        <div class="center-band"></div>
        <div class="needle" id="needle"></div>
      </div>
      <div class="status" id="statusText">Waiting for signal</div>

      <div class="meter-wrap">
        <div class="meter-label">Input level</div>
        <div class="meter">
          <div class="meter-fill" id="levelFill"></div>
        </div>
      </div>
    </div>

    <div class="targets" id="targets"></div>

    <div class="footer-note">
      Tip: play one string at a time, close to the microphone, and let the note ring. The needle should settle instead of twitch wildly.
    </div>
  </div>

  <script>
    const STANDARD_TUNING = [
      { name: "E2", freq: 82.41 },
      { name: "A2", freq: 110.00 },
      { name: "D3", freq: 146.83 },
      { name: "G3", freq: 196.00 },
      { name: "B3", freq: 246.94 },
      { name: "E4", freq: 329.63 }
    ];

    const NOTE_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

    const startBtn = document.getElementById("startBtn");
    const micState = document.getElementById("micState");
    const signalState = document.getElementById("signalState");
    const noteNameEl = document.getElementById("noteName");
    const freqEl = document.getElementById("freq");
    const centsEl = document.getElementById("cents");
    const needleEl = document.getElementById("needle");
    const statusText = document.getElementById("statusText");
    const levelFill = document.getElementById("levelFill");
    const scaleEl = document.getElementById("scale");
    const targetsEl = document.getElementById("targets");

    let audioContext = null;
    let analyser = null;
    let source = null;
    let timeData = null;
    let running = false;

    let selectedTarget = STANDARD_TUNING[0];

    let smoothedFreq = null;
    let smoothedCents = 0;
    let displayedCents = 0;
    let stableNoteName = "--";

    const NOISE_FLOOR = 0.012;
    const MIN_CONFIDENCE = 0.85;
    const MIN_FREQ = 70;
    const MAX_FREQ = 360;

    // How fast values settle. Lower = smoother, slower.
    const FREQ_SMOOTH = 0.18;
    const CENTS_SMOOTH = 0.14;
    const NEEDLE_SMOOTH = 0.22;

    function buildTargets() {
      targetsEl.innerHTML = "";
      STANDARD_TUNING.forEach((t, index) => {
        const div = document.createElement("div");
        div.className = "target" + (index === 0 ? " active" : "");
        div.innerHTML = `
          <div class="name">${t.name}</div>
          <div class="hz">${t.freq.toFixed(2)} Hz</div>
        `;
        div.addEventListener("click", () => {
          selectedTarget = t;
          document.querySelectorAll(".target").forEach(x => x.classList.remove("active"));
          div.classList.add("active");
        });
        targetsEl.appendChild(div);
      });
    }

    function buildScale() {
      const existing = scaleEl.querySelectorAll(".tick, .tick-label");
      existing.forEach(el => el.remove());

      const centerX = scaleEl.clientWidth / 2;
      const baseY = 152;
      const radius = Math.min(scaleEl.clientWidth * 0.38, 180);

      for (let cents = -50; cents <= 50; cents += 5) {
        const angle = (cents / 50) * 45; // -45 to +45 degrees
        const rad = (Math.PI / 180) * angle;

        const tick = document.createElement("div");
        tick.className = "tick";
        if (cents % 10 === 0) tick.classList.add("major");
        if (cents === 0) tick.classList.add("center");

        const x = centerX + Math.sin(rad) * radius;
        const y = baseY - Math.cos(rad) * radius;

        tick.style.left = `${x}px`;
        tick.style.bottom = `${scaleEl.clientHeight - y}px`;
        tick.style.transform = `translateX(-50%) rotate(${angle}deg)`;
        scaleEl.appendChild(tick);

        if (cents % 10 === 0) {
          const label = document.createElement("div");
          label.className = "tick-label";
          const labelRadius = radius + 28;
          const lx = centerX + Math.sin(rad) * labelRadius;
          const ly = baseY - Math.cos(rad) * labelRadius;
          label.style.left = `${lx}px`;
          label.style.bottom = `${scaleEl.clientHeight - ly}px`;
          label.style.transform = `translateX(-50%)`;
          label.textContent = cents > 0 ? `+${cents}` : `${cents}`;
          scaleEl.appendChild(label);
        }
      }
    }

    function midiFromFreq(freq) {
      return Math.round(69 + 12 * Math.log2(freq / 440));
    }

    function noteNameFromMidi(midi) {
      const name = NOTE_NAMES[midi % 12];
      const octave = Math.floor(midi / 12) - 1;
      return `${name}${octave}`;
    }

    function centsOffFromTarget(freq, targetFreq) {
      return 1200 * Math.log2(freq / targetFreq);
    }

    function nearestNote(freq) {
      const midi = midiFromFreq(freq);
      const targetFreq = 440 * Math.pow(2, (midi - 69) / 12);
      return {
        midi,
        noteName: noteNameFromMidi(midi),
        targetFreq,
        cents: centsOffFromTarget(freq, targetFreq)
      };
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function getRMS(buffer) {
      let sum = 0;
      for (let i = 0; i < buffer.length; i++) {
        const v = buffer[i];
        sum += v * v;
      }
      return Math.sqrt(sum / buffer.length);
    }

    // A cleaner autocorrelation pitch detector with light quality check
    function detectPitch(buffer, sampleRate) {
      const size = buffer.length;
      const rms = getRMS(buffer);
      if (rms < NOISE_FLOOR) {
        return { freq: null, clarity: 0, rms };
      }

      let bestOffset = -1;
      let bestCorr = 0;
      let foundGood = false;
      const correlations = new Array(size).fill(0);

      const minOffset = Math.floor(sampleRate / MAX_FREQ);
      const maxOffset = Math.floor(sampleRate / MIN_FREQ);

      for (let offset = minOffset; offset <= maxOffset; offset++) {
        let diff = 0;
        for (let i = 0; i < size - offset; i++) {
          diff += Math.abs(buffer[i] - buffer[i + offset]);
        }

        const corr = 1 - diff / (size - offset);
        correlations[offset] = corr;

        if (corr > MIN_CONFIDENCE && corr > bestCorr) {
          foundGood = true;
          bestCorr = corr;
          bestOffset = offset;
        } else if (foundGood && corr < bestCorr * 0.92) {
          // once we've passed the best likely peak, stop early
          break;
        }
      }

      if (bestOffset === -1) {
        return { freq: null, clarity: bestCorr, rms };
      }

      // Parabolic refinement around the best peak
      const x1 = correlations[bestOffset - 1] || correlations[bestOffset];
      const x2 = correlations[bestOffset];
      const x3 = correlations[bestOffset + 1] || correlations[bestOffset];
      const a = (x1 + x3 - 2 * x2) / 2;
      const b = (x3 - x1) / 2;

      let refinedOffset = bestOffset;
      if (a !== 0) {
        refinedOffset = bestOffset - b / (2 * a);
      }

      const freq = sampleRate / refinedOffset;
      if (!isFinite(freq) || freq < MIN_FREQ || freq > MAX_FREQ) {
        return { freq: null, clarity: bestCorr, rms };
      }

      return { freq, clarity: bestCorr, rms };
    }

    function updateUI(hasSignal, freq, cents, rms, noteText) {
      signalState.textContent = hasSignal ? "Signal: detected" : "Signal: waiting";
      noteNameEl.textContent = hasSignal ? noteText : "--";
      freqEl.textContent = hasSignal ? freq.toFixed(1) : "0.0";
      centsEl.textContent = hasSignal ? cents.toFixed(1) : "0.0";

      const levelPercent = clamp((rms / 0.08) * 100, 0, 100);
      levelFill.style.width = `${levelPercent}%`;

      const needleCents = clamp(displayedCents, -50, 50);
      const angle = (needleCents / 50) * 45;
      needleEl.style.transform = `translateX(-50%) rotate(${angle}deg)`;

      if (!hasSignal) {
        statusText.textContent = "Waiting for signal";
        statusText.className = "status";
        return;
      }

      const absCents = Math.abs(cents);
      if (absCents <= 4) {
        statusText.textContent = "In tune";
        statusText.className = "status good";
      } else if (absCents <= 10) {
        statusText.textContent = cents < 0 ? "Slightly flat" : "Slightly sharp";
        statusText.className = "status warn";
      } else {
        statusText.textContent = cents < 0 ? "Flat" : "Sharp";
        statusText.className = "status bad";
      }
    }

    function processAudio() {
      if (!running || !analyser) return;

      analyser.getFloatTimeDomainData(timeData);
      const result = detectPitch(timeData, audioContext.sampleRate);

      if (!result.freq) {
        smoothedFreq = null;
        smoothedCents = lerp(smoothedCents, 0, 0.08);
        displayedCents = lerp(displayedCents, 0, 0.08);
        updateUI(false, 0, 0, result.rms, "--");
        requestAnimationFrame(processAudio);
        return;
      }

      // Smooth frequency
      smoothedFreq = smoothedFreq == null
        ? result.freq
        : lerp(smoothedFreq, result.freq, FREQ_SMOOTH);

      const note = nearestNote(smoothedFreq);

      // Keep note label stable by preferring selected string when near it
      let displayNote = note.noteName;
      let rawCents = note.cents;

      if (selectedTarget) {
        const selectedCents = centsOffFromTarget(smoothedFreq, selectedTarget.freq);
        if (Math.abs(selectedCents) < 35) {
          displayNote = selectedTarget.name;
          rawCents = selectedCents;
        }
      }

      smoothedCents = lerp(smoothedCents, rawCents, CENTS_SMOOTH);
      displayedCents = lerp(displayedCents, smoothedCents, NEEDLE_SMOOTH);
      stableNoteName = displayNote;

      updateUI(true, smoothedFreq, smoothedCents, result.rms, stableNoteName);
      requestAnimationFrame(processAudio);
    }

    async function startMic() {
      try {
        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }

        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false
          }
        });

        source = audioContext.createMediaStreamSource(stream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 2048;
        analyser.smoothingTimeConstant = 0;
        source.connect(analyser);

        timeData = new Float32Array(analyser.fftSize);

        running = true;
        micState.textContent = "Mic: on";
        startBtn.textContent = "Microphone Running";
        startBtn.disabled = true;

        processAudio();
      } catch (err) {
        console.error(err);
        micState.textContent = "Mic: failed";
        statusText.textContent = "Microphone access denied or unavailable";
        statusText.className = "status bad";
      }
    }

    startBtn.addEventListener("click", startMic);
    window.addEventListener("resize", buildScale);

    buildTargets();
    buildScale();
  </script>
</body>
</html>
